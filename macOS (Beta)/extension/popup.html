<html>
	<head>
		<meta charset="UTF-8">
		<style>
		* {
			font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
			font-size: 14px;
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			width: 300px;
			padding: 16px;
			background: #111b21;
			color: #e9edef;
		}

		h2 {
			font-size: 15px;
			font-weight: 600;
			margin-bottom: 12px;
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.status {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 10px 12px;
			border-radius: 8px;
			background: #1f2c34;
			margin-bottom: 12px;
		}

		.status-dot {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			flex-shrink: 0;
		}

		.status-dot.online { background: #4caf50; }
		.status-dot.offline { background: #ef4146; }
		.status-dot.checking { background: #999; }
		.status-dot.loading { background: #ff9800; animation: pulse 1s infinite; }

		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.4; }
		}

		.status-text { font-size: 13px; }
		.status-model { font-size: 11px; color: #8696a0; margin-top: 2px; }

		/* Progress bar */
		.progress-container {
			margin-bottom: 12px;
			display: none;
		}
		.progress-container.visible { display: block; }

		.progress-label {
			font-size: 12px;
			color: #e9edef;
			margin-bottom: 4px;
		}
		.progress-bar {
			height: 6px;
			background: #1a262d;
			border-radius: 3px;
			overflow: hidden;
		}
		.progress-fill {
			height: 100%;
			background: #008069;
			border-radius: 3px;
			width: 0%;
			transition: width 0.5s ease;
		}
		.progress-detail {
			font-size: 11px;
			color: #8696a0;
			margin-top: 3px;
		}

		.engine-info {
			padding: 10px 12px;
			border-radius: 8px;
			background: #1f2c34;
			margin-bottom: 12px;
			font-size: 12px;
		}
		.engine-label { color: #8696a0; font-size: 11px; }
		.engine-value { font-weight: 600; margin-top: 2px; }

		/* Log area */
		.log-area {
			max-height: 80px;
			overflow-y: auto;
			font-size: 11px;
			font-family: "SF Mono", "Menlo", monospace;
			color: #8696a0;
			background: #1a262d;
			border-radius: 8px;
			padding: 8px 10px;
			margin-bottom: 12px;
			display: none;
			line-height: 1.6;
		}
		.log-area.visible { display: block; }
		.log-entry.info { color: #8696a0; }
		.log-entry.success { color: #4caf50; }
		.log-entry.warn { color: #ff9800; }
		.log-entry.error { color: #ef4146; }

		.info-text {
			font-size: 12px;
			color: #8696a0;
			line-height: 1.5;
		}
		</style>
	</head>
	<body>
		<h2>&#127908; WhatsGPU <span style="font-size:10px;color:#8696a0;">macOS</span></h2>

		<div class="status">
			<div class="status-dot checking" id="dot"></div>
			<div>
				<div class="status-text" id="status-text">Verificando...</div>
				<div class="status-model" id="status-model"></div>
			</div>
		</div>

		<div class="progress-container" id="progress-container">
			<div class="progress-label" id="progress-label"></div>
			<div class="progress-bar">
				<div class="progress-fill" id="progress-fill"></div>
			</div>
			<div class="progress-detail" id="progress-detail"></div>
		</div>

		<div class="engine-info" id="engine-info" style="display:none;">
			<div class="engine-label">Motor de transcrição</div>
			<div class="engine-value" id="engine-name">SFSpeechRecognizer</div>
			<div class="engine-label" style="margin-top:6px;">Chip</div>
			<div class="engine-value" id="chip-name">—</div>
		</div>

		<div class="log-area" id="log-area"></div>

		<p class="info-text">
			Clique no botão <b>"Transcrever"</b> ao lado de qualquer áudio no WhatsApp Web.
		</p>

		<script src="popup.js"></script>
	</body>
</html>
