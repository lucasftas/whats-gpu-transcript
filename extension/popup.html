<html>
	<head>
		<meta charset="UTF-8">
		<style>
		* {
			font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
			font-size: 14px;
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			width: 320px;
			padding: 16px;
			background: #111b21;
			color: #e9edef;
		}

		h2 {
			font-size: 15px;
			font-weight: 600;
			margin-bottom: 12px;
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.status {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 10px 12px;
			border-radius: 8px;
			background: #1f2c34;
			margin-bottom: 12px;
		}

		.status-dot {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			flex-shrink: 0;
		}

		.status-dot.online { background: #4caf50; }
		.status-dot.offline { background: #ef4146; }
		.status-dot.checking { background: #999; }
		.status-dot.loading { background: #ff9800; animation: pulse 1s infinite; }

		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.4; }
		}

		.status-text { font-size: 13px; }
		.status-model { font-size: 11px; color: #8696a0; margin-top: 2px; }

		/* Progress bar */
		.progress-container {
			margin-bottom: 12px;
			display: none;
		}
		.progress-container.visible { display: block; }

		.progress-label {
			font-size: 12px;
			color: #e9edef;
			margin-bottom: 4px;
		}
		.progress-bar {
			height: 6px;
			background: #1a262d;
			border-radius: 3px;
			overflow: hidden;
		}
		.progress-fill {
			height: 100%;
			background: #008069;
			border-radius: 3px;
			width: 0%;
			transition: width 0.5s ease;
		}
		.progress-detail {
			font-size: 11px;
			color: #8696a0;
			margin-top: 3px;
		}

		/* Models section */
		.section-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin-bottom: 8px;
		}

		.section-title {
			font-size: 12px;
			font-weight: 600;
			color: #8696a0;
			text-transform: uppercase;
			letter-spacing: 0.5px;
		}

		.btn-refresh {
			background: none;
			border: none;
			color: #8696a0;
			cursor: pointer;
			font-size: 14px;
			padding: 2px 4px;
			border-radius: 4px;
		}
		.btn-refresh:hover { color: #e9edef; background: #1f2c34; }

		.models-list {
			margin-bottom: 12px;
		}

		.model-item {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 8px 10px;
			border-radius: 6px;
			background: #1f2c34;
			margin-bottom: 4px;
			font-size: 12px;
		}

		.model-item.selected {
			border: 1px solid #008069;
		}

		.model-status {
			flex-shrink: 0;
			font-size: 14px;
		}

		.model-info {
			flex: 1;
			min-width: 0;
		}

		.model-name {
			font-weight: 600;
			font-size: 12px;
		}

		.model-desc {
			font-size: 10px;
			color: #8696a0;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.model-item:hover .model-desc {
			white-space: normal;
			overflow: visible;
		}

		.model-item:hover {
			background: #2a3942;
		}

		.model-size {
			font-size: 11px;
			color: #8696a0;
			flex-shrink: 0;
		}

		.badge {
			font-size: 9px;
			padding: 2px 5px;
			border-radius: 3px;
			font-weight: 600;
			flex-shrink: 0;
		}
		.badge-rec {
			background: #008069;
			color: white;
		}

		.model-btn {
			padding: 3px 8px;
			border: none;
			border-radius: 4px;
			font-size: 11px;
			cursor: pointer;
			flex-shrink: 0;
			color: white;
		}
		.model-btn:disabled { opacity: 0.4; cursor: not-allowed; }
		.model-btn-download { background: #008069; }
		.model-btn-download:hover:not(:disabled) { background: #006e5a; }
		.model-btn-delete { background: #ef4146; font-size: 13px; padding: 2px 6px; }
		.model-btn-delete:hover:not(:disabled) { background: #d63136; }
		.model-btn-link { background: #2196F3; text-decoration: none; display: inline-block; }
		.model-btn-link:hover { background: #1976D2; }
		.model-btn-cancel { background: #ff9800; }
		.model-btn-cancel:hover:not(:disabled) { background: #e68900; }

		/* GPU controls */
		.gpu-controls {
			display: flex;
			gap: 8px;
			margin-bottom: 12px;
		}

		.gpu-btn {
			flex: 1;
			padding: 8px 10px;
			border: none;
			border-radius: 8px;
			font-size: 12px;
			font-weight: 600;
			cursor: pointer;
			transition: opacity 0.2s;
			color: white;
		}
		.gpu-btn:disabled { opacity: 0.4; cursor: not-allowed; }
		.gpu-btn-load { background: #008069; }
		.gpu-btn-load:hover:not(:disabled) { background: #006e5a; }
		.gpu-btn-unload { background: #ef4146; }
		.gpu-btn-unload:hover:not(:disabled) { background: #d63136; }

		/* Log area */
		.log-area {
			max-height: 100px;
			overflow-y: auto;
			font-size: 11px;
			font-family: "Cascadia Code", "Consolas", monospace;
			color: #8696a0;
			background: #1a262d;
			border-radius: 8px;
			padding: 8px 10px;
			margin-bottom: 12px;
			display: none;
			line-height: 1.6;
		}
		.log-area.visible { display: block; }
		.log-entry.info { color: #8696a0; }
		.log-entry.success { color: #4caf50; }
		.log-entry.warn { color: #ff9800; }
		.log-entry.error { color: #ef4146; }

		.info-text {
			font-size: 12px;
			color: #8696a0;
			line-height: 1.5;
		}
		</style>
	</head>
	<body>
		<h2>&#127908; Whats GPU</h2>

		<div class="status">
			<div class="status-dot checking" id="dot"></div>
			<div>
				<div class="status-text" id="status-text">Verificando...</div>
				<div class="status-model" id="status-model"></div>
			</div>
		</div>

		<div class="progress-container" id="progress-container">
			<div class="progress-label" id="progress-label"></div>
			<div class="progress-bar">
				<div class="progress-fill" id="progress-fill"></div>
			</div>
			<div class="progress-detail" id="progress-detail"></div>
		</div>

		<div class="section-header">
			<div class="section-title">Modelos</div>
			<button class="btn-refresh" id="btn-refresh" title="Atualizar lista de modelos">&#8635;</button>
		</div>
		<div class="models-list" id="models-list">
			<div class="model-item" style="color: #8696a0;">Carregando...</div>
		</div>

		<div class="gpu-controls">
			<button class="gpu-btn gpu-btn-load" id="btn-load" disabled>Subir Modelo na GPU</button>
			<button class="gpu-btn gpu-btn-unload" id="btn-unload" disabled>Limpar GPU</button>
		</div>

		<div class="log-area" id="log-area"></div>

		<p class="info-text">
			Clique no botão <b>"Transcrever"</b> ao lado de qualquer áudio no WhatsApp Web.
		</p>

		<script src="popup.js"></script>
	</body>
</html>
